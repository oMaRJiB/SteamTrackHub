<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 40px; }
        h1 { color: #006400; text-align: center; }
        form { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; }
        label { display: block; margin: 15px 0 5px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; }
        .back { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Write a Review</h1>
    <form method="POST">
        <label for="score">Score (1-10):</label>
        <input type="number" id="score" name="score" min="1" max="10" required>

        <label for="review_text">Your Review:</label>
        <textarea id="review_text" name="review_text" rows="6" required></textarea>

        <button type="submit">Submit Review</button>
    </form>

    <p class="back">
        <a href="/library">← Back to Library</a>
    </p>
</body>
</html>
